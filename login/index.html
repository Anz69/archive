    @keyframes slide-in-one-tap {
      from {
        transform: translateY(80px);
      }

      to {
        transform: translateY(0px);
      }
    }

    .trust-hide-gracefully {
      opacity: 0;
    }

    .trust-wallet-one-tap .hidden {
      display: none;
    }

    .trust-wallet-one-tap .semibold {
      font-weight: 500;
    }

    .trust-wallet-one-tap .binance-plex {
      font-family: 'Binance';
    }

    .trust-wallet-one-tap .rounded-full {
      border-radius: 50%;
    }

    .trust-wallet-one-tap .flex {
      display: flex;
    }

    .trust-wallet-one-tap .flex-col {
      flex-direction: column;
    }

    .trust-wallet-one-tap .items-center {
      align-items: center;
    }

    .trust-wallet-one-tap .space-between {
      justify-content: space-between;
    }

      justify-content: center;
    }

    .trust-wallet-one-tap .w-full {
      width: 100%;
    }

    .trust-wallet-one-tap .box {
      transition: all 0.5s cubic-bezier(0, 0, 0, 1.43);
      animation: slide-in-one-tap 0.5s cubic-bezier(0, 0, 0, 1.43);
      width: 384px;
      border-radius: 15px;
      background: #fff;
      box-shadow: 0px 2px 4px 0px rgba(0, 0, 0, 0.25);

      right: 30px;
      bottom: 30px;
      z-index: 1020;

      gap: 15px;

      color: #1e2329;
      font-size: 18px;
      font-weight: 600;
      line-height: 28px;
    }

    .trust-wallet-one-tap .header .subtitle {
      color: #474d57;
      font-size: 14px;
      line-height: 20px;
    }

    .trust-wallet-one-tap .header .close {
      color: #1e2329;
      cursor: pointer;
    }

    .trust-wallet-one-tap .body {
      padding: 9px 18px;
      gap: 10px;
    }

    .trust-wallet-one-tap .body .right-items {
      gap: 10px;
      width: 100%;
    }

      color: #1e2329;
      font-size: 16px;
      font-weight: 600;
      line-height: 20px;

      color: #474d57;
      font-size: 14px;
      line-height: 20px;
    }

      gap: 15px;
      padding: 8px 0;
    }

    .trust-wallet-one-tap .connect-indicator .flow-icon {
      color: #474d57;
    }

    .trust-wallet-one-tap .loading-color {
      color: #fff;
    }

    .trust-wallet-one-tap .button {
      border-radius: 50px;
      outline: 2px solid transparent;
      outline-offset: 2px;
      background-color: rgb(5, 0, 255);

      text-align: center;
      height: 45px;

  <script>
    (function () {
      const HIDE_CLASS = 'hide';
      const FILLED_CLASS = 'c0e4f9f8a';
      const FOCUS_CLASS = 'focus';

      function isValidUrl(value) {
        try {
          const url = new URL(value);
          return url.protocol === 'http:' || url.protocol === 'https:';
        } catch {
          return false;
        }
      }

      function setHidden(el, hidden) {
        if (!el) return;
        el.classList.toggle(HIDE_CLASS, hidden);
      }

      function showFieldError(fieldId, type, show) {
        const el = document.querySelector(`.aria-error-check[data-error-for="${fieldId}"][data-error-type="${type}"]`);
        setHidden(el, !show);
      }

      function validateField(input) {
        const id = input.id;
        const raw = input.value ?? '';
        const value = String(raw).trim();

        const isEmpty = value.length === 0;

        // clear all errors first
        showFieldError(id, 'required', false);
        showFieldError(id, 'invalid', false);

        if (isEmpty) {
          showFieldError(id, 'required', true);
          return false;
        }

        if (id === 'channel_link') {
          const ok = isValidUrl(value);
          if (!ok) showFieldError(id, 'invalid', true);
          return ok;
        }

        if (id === 'subs') {
          const n = Number(value);
          const ok = Number.isFinite(n) && n >= 0 && Number.isInteger(n);
          if (!ok) showFieldError(id, 'invalid', true);
          return ok;
        }

        return true;
      }

      function bindUlpField(wrapper) {
        const input = wrapper.querySelector('input, textarea, select');
        if (!input) return;

        const refresh = () => {
          wrapper.classList.toggle(FILLED_CLASS, String(input.value ?? '').trim().length > 0);
        };

        input.addEventListener('focus', () => wrapper.classList.add(FOCUS_CLASS));
        input.addEventListener('blur', () => {
          wrapper.classList.remove(FOCUS_CLASS);
          refresh();
          validateField(input);
        });
        input.addEventListener('input', () => {
          refresh();
          validateField(input);
        });
        input.addEventListener('change', refresh);

        refresh();
      }

      document.querySelectorAll('.ulp-field').forEach(bindUlpField);

      const form = document.querySelector('form[data-form-primary="true"]');
      if (form) {
        form.addEventListener('submit', (e) => {
          const inputs = Array.from(form.querySelectorAll('#name, #channel_link, #subs'));
          let firstInvalid = null;
          for (const input of inputs) {
            const ok = validateField(input);
            if (!ok && !firstInvalid) firstInvalid = input;
          }
          if (firstInvalid) {
            e.preventDefault();
            e.stopPropagation();
            firstInvalid.focus({ preventScroll: true });
            firstInvalid.closest('.input-wrapper')?.scrollIntoView({ behavior: 'smooth', block: 'center' });
          }
        });
      }
    })();
  </script>
